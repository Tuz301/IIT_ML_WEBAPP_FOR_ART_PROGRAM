# Nginx Load Balanced Configuration for IIT ML Service
# This configuration supports multiple backend instances with health checks
# and session affinity for production deployments

# =============================================================================
# Upstream Configuration with Load Balancing
# =============================================================================

# Primary backend pool with load balancing
upstream ml_service_backend {
    # Load balancing method: least_conn (least connections)
    # Alternative: ip_hash for session affinity based on client IP
    least_conn;
    
    # Backend servers - adjust ports/addresses based on your deployment
    # For Docker Compose: use service names
    # For Kubernetes: use service names
    # For multi-instance: use multiple ports or different hosts
    
    # Primary backend instances
    server ml-service-1:8000 max_fails=3 fail_timeout=30s weight=1;
    server ml-service-2:8001 max_fails=3 fail_timeout=30s weight=1;
    server ml-service-3:8002 max_fails=3 fail_timeout=30s weight=1;
    
    # Backup instance (only used when all primaries are down)
    server ml-service-backup:8003 backup;
    
    # Keepalive connections to backend
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Alternative upstream with IP hash for session affinity
# Use this for WebSocket or stateful operations
upstream ml_service_backend_sticky {
    ip_hash;
    
    server ml-service-1:8000 max_fails=3 fail_timeout=30s;
    server ml-service-2:8001 max_fails=3 fail_timeout=30s;
    server ml-service-3:8002 max_fails=3 fail_timeout=30s;
    
    keepalive 32;
}

# =============================================================================
# Rate Limiting Zones
# =============================================================================

# Global API rate limit
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Stricter rate limit for authentication endpoints
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Rate limit for prediction endpoints
limit_req_zone $binary_remote_addr zone=prediction_limit:10m rate=20r/s;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# =============================================================================
# Caching Configuration
# =============================================================================

# Cache zone for API responses
proxy_cache_path /var/cache/nginx/api_cache 
    levels=1:2 
    keys_zone=api_cache:10m 
    max_size=100m 
    inactive=60m 
    use_temp_path=off;

# Cache zone for static assets
proxy_cache_path /var/cache/nginx/static_cache 
    levels=1:2 
    keys_zone=static_cache:5m 
    max_size=500m 
    inactive=30d 
    use_temp_path=off;

# =============================================================================
# GeoIP Block (optional - requires GeoIP module)
# =============================================================================

# Allow specific countries only (uncomment and configure as needed)
# geo $allowed_country {
#     default 0;
#     US 1;
#     GB 1;
#     NG 1;  # Nigeria
#     # Add your allowed countries
# }

# =============================================================================
# Maps for Request Routing
# =============================================================================

# Map for cache bypass
map $request_method $no_cache {
    default 0;
    POST 1;
    PUT 1;
    DELETE 1;
    PATCH 1;
}

# =============================================================================
# HTTP Server - Redirect to HTTPS
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # Allow health checks and Let's Encrypt on HTTP
    location /health {
        proxy_pass http://ml_service_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        access_log off;
    }
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS Server - Main Configuration
# =============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;
    
    # =========================================================================
    # SSL/TLS Configuration
    # =========================================================================
    
    # SSL certificates
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # SSL protocols and ciphers (modern configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL session configuration
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # =========================================================================
    # Security Headers
    # =========================================================================
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Other security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    
    # =========================================================================
    # Logging
    # =========================================================================
    
    access_log /var/log/nginx/ml_service_access.log combined;
    error_log /var/log/nginx/ml_service_error.log warn;
    
    # =========================================================================
    # Connection Limits
    # =========================================================================
    
    limit_conn conn_limit 20;
    
    # =========================================================================
    # Client Configuration
    # =========================================================================
    
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    
    # =========================================================================
    # Root Location - API Proxy with Caching
    # =========================================================================
    
    location / {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        # Connection limiting
        limit_conn conn_limit 10;
        
        # Cache configuration
        proxy_cache api_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 302 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_bypass $no_cache;
        proxy_no_cache $no_cache;
        
        # Cache headers for response
        add_header X-Cache-Status $upstream_cache_status;
        
        # Proxy configuration
        proxy_pass http://ml_service_backend;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Next upstream on error
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }
    
    # =========================================================================
    # Authentication Endpoints - Sticky Session
    # =========================================================================
    
    location /v1/auth/ {
        # Stricter rate limiting
        limit_req zone=auth_limit burst=5 nodelay;
        
        # No caching for auth
        proxy_cache off;
        
        # Use sticky session upstream
        proxy_pass http://ml_service_backend_sticky;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Shorter timeouts for auth
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # =========================================================================
    # Prediction Endpoints - Higher Rate Limit
    # =========================================================================
    
    location /v1/predictions/ {
        # Higher rate limit for predictions
        limit_req zone=prediction_limit burst=50 nodelay;
        
        # No caching for predictions
        proxy_cache off;
        
        proxy_pass http://ml_service_backend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Longer timeout for ML predictions
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
    
    # =========================================================================
    # Health Check - No Rate Limiting
    # =========================================================================
    
    location /health {
        proxy_pass http://ml_service_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Very short timeout for health checks
        proxy_connect_timeout 3s;
        proxy_send_timeout 3s;
        proxy_read_timeout 3s;
        
        access_log off;
    }
    
    # =========================================================================
    # Metrics Endpoint - Restricted Access
    # =========================================================================
    
    location /metrics {
        # Restrict to internal networks (uncomment in production)
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;
        
        proxy_pass http://ml_service_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Short timeout
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # =========================================================================
    # Static Files - Aggressive Caching
    # =========================================================================
    
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # CORS for static assets
        add_header Access-Control-Allow-Origin "*";
        
        access_log off;
    }
    
    # =========================================================================
    # API Documentation
    # =========================================================================
    
    location /docs {
        proxy_pass http://ml_service_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /openapi.json {
        # Cache OpenAPI schema
        proxy_cache static_cache;
        proxy_cache_valid 200 1h;
        
        proxy_pass http://ml_service_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # =========================================================================
    # Security - Deny Access to Hidden Files
    # =========================================================================
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to sensitive files
    location ~* \.(env|git|svn|htaccess|htpasswd)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# =============================================================================
# Status Page (Optional - for monitoring)
# =============================================================================

server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    
    # Restrict to localhost
    allow 127.0.0.1;
    allow ::1;
    deny all;
    
    location /nginx_status {
        stub_status on;
        access_log off;
    }
}
